<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacancies RSS Widget</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: transparent;
      margin: 0;
      padding: 20px 10px;
    }

    .vacancies-container { max-width: 1200px; margin: 0 auto; }

    .vacancies-track {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .vacancy-card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      border-left: 6px solid #1368a5;
      padding: 20px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .loading {
      text-align: center;
      color: #64748b;
      padding: 40px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="vacancies-container">
    <div class="vacancies-track" id="vacancies-track">
      <div class="loading">Loading vacancies…</div>
    </div>
  </div>

  <script>
    async function fetchVacancies() {
      const rssInput =
        "https://mycareer.bathspa.ac.uk/content/rss/MyCareerPTJobs/e7ff9b8c15769a944e719b4033dea757bf1a4a8a";

      const track = document.getElementById("vacancies-track");

      const proxyUrl =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(rssInput);

      try {
        const response = await fetch(proxyUrl);
        const rssText = await response.text();

        const xml = new DOMParser().parseFromString(rssText, "text/xml");
        const items = Array.from(xml.querySelectorAll("item"));

        track.innerHTML = "";
        items.forEach(item => {
          const title = item.querySelector("title")?.textContent ?? "Vacancy";
          const link  = item.querySelector("link")?.textContent ?? "#";

          const card = document.createElement("a");
          card.className = "vacancy-card";
          card.href = link;
          card.target = "_blank";
          card.textContent = title;

          track.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        track.innerHTML =
          '<div class="loading">Failed to load vacancies</div>';
      }
    }

    fetchVacancies();
  </script>

</body>
</html>
